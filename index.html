<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shoot Coordinate Tool</title>
<style>
body{
    font-family:Arial;
    text-align:center;
    padding:20px;
}
img{
    max-width:90%;
    max-height:70vh;
    cursor:crosshair;
    border:1px solid #999;
}
button, select{
    padding:10px;
    margin:8px;
    font-size:16px;
}
#result{
    margin-top:15px;
    font-size:24px;
    font-weight:bold;
}
</style>
</head>
<body>

<h2>Click Target</h2>

<select id="picker">
<option value="0">Image 1</option>
<option value="1">Image 2</option>
<option value="2">Image 3</option>
<option value="3">Image 4</option>
</select>

<br>

<img id="map">

<div id="result">!shoot ? ?</div>

<button onclick="copyText()">Copy</button>

<script>
const images = [
 {file:"img1.png", w:1920, h:1080},
 {file:"img2.png", w:1280, h:720},
 {file:"img3.png", w:1600, h:900},
 {file:"img4.png", w:2560, h:1440}
];

const picker = document.getElementById("picker");
const map = document.getElementById("map");
const result = document.getElementById("result");

let currentText = "";

function loadImage(){
    const i = images[picker.value];
    map.src = i.file;
}
picker.addEventListener("change", loadImage);

map.addEventListener("click", function(e){
    const img = images[picker.value];
    const rect = map.getBoundingClientRect();

    const clickX = e.clientX - rect.left;
    const clickY = e.clientY - rect.top;

    const x = Math.round(clickX / rect.width * img.w);
    const y = Math.round(clickY / rect.height * img.h);

    currentText = `!shoot ${x} ${y}`;
    result.innerText = currentText;
});

function copyText(){
    navigator.clipboard.writeText(currentText);
}

loadImage();
</script>

</body>
</html>
