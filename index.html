<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shoot Coordinate Tool</title>

<style>
body{
    margin:0;
    padding:20px;
    background:#2f2f2f;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
}

h2{
    margin-top:0;
}

select{
    padding:10px;
    font-size:16px;
    margin-bottom:15px;
    background:#444;
    color:white;
    border:1px solid #666;
}

#wrap{
    position:relative;
    display:inline-block;
    max-width:90%;
}

#map{
    max-width:100%;
    max-height:75vh;
    display:block;
    cursor:crosshair;
    border:1px solid #666;
}

#marker{
    position:absolute;
    width:10px;
    height:10px;
    background:red;
    border-radius:50%;
    transform:translate(-50%, -50%);
    pointer-events:none;
    display:none;
    box-shadow:0 0 6px red;
}

#result{
    margin-top:18px;
    font-size:24px;
    font-weight:bold;
}
</style>
</head>

<body>

<h2>Click Target</h2>

<select id="picker">
<option value="0">Image 1</option>
<option value="1">Image 2</option>
<option value="2">Image 3</option>
<option value="3">Image 4</option>
</select>

<br>

<div id="wrap">
    <img id="map">
    <div id="marker"></div>
</div>

<div id="result">!shoot ? ?</div>

<script>
const images = [
 {file:"img1.png", w:1920, h:1080},
 {file:"img2.png", w:1280, h:720},
 {file:"img3.png", w:1600, h:900},
 {file:"img4.png", w:2560, h:1440}
];

const picker = document.getElementById("picker");
const map = document.getElementById("map");
const marker = document.getElementById("marker");
const result = document.getElementById("result");

function loadImage(){
    map.src = images[picker.value].file;
    marker.style.display = "none";
    result.innerText = "!shoot ? ?";
}

picker.addEventListener("change", loadImage);

map.addEventListener("click", function(e){

    const img = images[picker.value];
    const rect = map.getBoundingClientRect();

    const localX = e.clientX - rect.left;
    const localY = e.clientY - rect.top;

    const x = Math.round(localX / rect.width * img.w);
    const y = Math.round(localY / rect.height * img.h);

    const text = `!shoot ${x} ${y}`;

    result.innerText = text;

    marker.style.left = localX + "px";
    marker.style.top = localY + "px";
    marker.style.display = "block";

    navigator.clipboard.writeText(text);
});

loadImage();
</script>

</body>
</html>
