<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dragon Shooter</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:24px;
    background:#2f2f2f;
    color:#fab901;
    font-family:Arial, sans-serif;
    text-align:center;
}

#controls{
    margin-bottom:18px;
}

label{
    font-size:16px;
    margin-right:8px;
}

select{
    padding:10px;
    font-size:16px;
    background:#444;
    color:#fab901;
    border:1px solid #666;
}

#main{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    width:100%;
    max-width:1700px;
    margin:0 auto;
}

#wrap{
    position:relative;
    flex:1;
    min-width:0;
    display:flex;
    justify-content:flex-end;
    align-items:center;
    padding-right:40px;
}

#map{
    display:block;
    width:auto;
    height:auto;
    max-width:100%;
    max-height:82vh;
    border:1px solid #666;
    cursor:crosshair;
}

#marker{
    position:absolute;
    width:10px;
    height:10px;
    background:red;
    border-radius:50%;
    transform:translate(-50%, -50%);
    pointer-events:none;
    display:none;
    box-shadow:0 0 6px red;
    z-index:10;
}

#guideBlock{
    width:260px;
    flex-shrink:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:10px;
}

#guide{
    width:100%;
    height:auto;
    border:1px solid #666;
    border-radius:6px;
    opacity:0.95;
}

#copied{
    font-size:14px;
    color:#fab901;
    opacity:0.9;
    min-height:18px;
}

#result{
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:28px;
    font-size:24px;
    font-weight:bold;
}

.coord{
    background:#3b3b3b;
    padding:10px 18px;
    border-radius:8px;
    border:1px solid #555;
    min-width:130px;
}

.coordLabel{
    opacity:0.7;
    font-size:15px;
    margin-right:8px;
}
</style>
</head>

<body>

<div id="controls">
    <label>Select Map:</label>
    <select id="picker">
        <option value="0">Ice</option>
        <option value="1">Snake</option>
        <option value="2">Castle</option>
        <option value="3">Volcano</option>
    </select>
</div>

<div id="main">
    <div id="wrap">
        <img id="map">
        <div id="marker"></div>
    </div>

    <div id="guideBlock">
        <img id="guide" src="guide.png" alt="Guide">
        <div id="copied"></div>
    </div>
</div>

<div id="result">
    <div class="coord">
        <span class="coordLabel">X</span>
        <span id="xCoord">?</span>
    </div>
    <div class="coord">
        <span class="coordLabel">Y</span>
        <span id="yCoord">?</span>
    </div>
</div>

<script>
const images = [
    {
        file:"img1.png",
        origin:{x:100,y:110},
        scaleX:172,
        scaleY:172
    },
    {
        file:"img2.png",
        origin:{x:116,y:148},
        scaleX:188,
        scaleY:188
    },
    {
        file:"img3.png",
        origin:{x:46,y:50},
        scaleX:74,
        scaleY:74
    },
    {
        file:"img4.png",
        origin:{x:34,y:43},
        scaleX:55,
        scaleY:55
    }
];

const picker = document.getElementById("picker");
const map = document.getElementById("map");
const marker = document.getElementById("marker");
const copied = document.getElementById("copied");
const xCoord = document.getElementById("xCoord");
const yCoord = document.getElementById("yCoord");
const wrap = document.getElementById("wrap");

function loadImage(){
    map.src = images[picker.value].file;
    marker.style.display = "none";
    xCoord.innerText = "?";
    yCoord.innerText = "?";
    copied.innerText = "";
}

function getCoords(e){
    const cfg = images[picker.value];
    const rect = map.getBoundingClientRect();
    const scaleX = map.naturalWidth / rect.width;
    const scaleY = map.naturalHeight / rect.height;
    const offsetX = e.clientX - rect.left;
    const offsetY = e.clientY - rect.top;
    const imgX = offsetX * scaleX;
    const imgY = offsetY * scaleY;
    const x = (imgX - cfg.origin.x) / cfg.scaleX;
    const y = (imgY - cfg.origin.y) / cfg.scaleY;
    return {
        x: x.toFixed(1),
        y: y.toFixed(1),
        markerX: e.clientX - wrap.getBoundingClientRect().left,
        markerY: e.clientY - wrap.getBoundingClientRect().top
    };
}

map.addEventListener("mousemove", function(e){
    const c = getCoords(e);
    xCoord.innerText = c.x;
    yCoord.innerText = c.y;
});

map.addEventListener("click", function(e){
    const c = getCoords(e);
    const text = `!shoot ${c.x} ${c.y}`;
    navigator.clipboard.writeText(text);
    xCoord.innerText = c.x;
    yCoord.innerText = c.y;
    marker.style.left = c.markerX + "px";
    marker.style.top = c.markerY + "px";
    marker.style.display = "block";
    copied.innerText = `Copied: ${text}`;
});

picker.addEventListener("change", loadImage);

loadImage();
</script>

</body>
</html>
