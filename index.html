<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shoot Coordinate Tool (Calibrated)</title>

<style>
body{
    margin:0;
    padding:20px;
    background:#2f2f2f;
    color:#fab901;
    font-family:Arial, sans-serif;
    text-align:center;
}

h2{
    margin-top:0;
}

#controls{
    margin-bottom:15px;
}

label{
    font-size:16px;
    margin-right:8px;
}

select{
    padding:10px;
    font-size:16px;
    background:#444;
    color:#fab901;
    border:1px solid #666;
}

#main{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    margin-left:140px;
}

#wrap{
    position:relative;
    display:inline-block;
    max-width:90%;
}

#map{
    max-width:100%;
    max-height:75vh;
    display:block;
    cursor:crosshair;
    border:1px solid #666;
}

#marker{
    position:absolute;
    width:10px;
    height:10px;
    background:red;
    border-radius:50%;
    transform:translate(-50%, -50%);
    pointer-events:none;
    display:none;
    box-shadow:0 0 6px red;
}

#guideBlock{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
}

/* guide image */
#guide{
    width:240px;
    height:auto;
    border:1px solid #666;
    border-radius:6px;
    opacity:0.9;
}

/* copied text */
#copied{
    font-size:14px;
    color:#fab901;
    opacity:0.85;
    min-height:18px;
}

#result{
    margin-top:18px;
    font-size:24px;
    font-weight:bold;
}
</style>
</head>

<body>

<h2>Click Target</h2>

<div id="controls">
    <label>Select Map:</label>

    <select id="picker">
        <option value="0">Ice</option>
        <option value="1">Snake</option>
        <option value="2">Castle</option>
        <option value="3">Volcano</option>
    </select>
</div>

<div id="main">

    <div id="wrap">
        <img id="map">
        <div id="marker"></div>
    </div>

    <div id="guideBlock">
        <img id="guide" src="guide.png" alt="Guide">
        <div id="copied"></div>
    </div>

</div>

<div id="result">!shoot ? ?</div>

<script>

const images = [
{
    file:"img1.png",
    origin:{x:100,y:110},
    scaleX:172,
    scaleY:172
},
{
    file:"img2.png",
    origin:{x:116,y:148},
    scaleX:188,
    scaleY:188
},
{
    file:"img3.png",
    origin:{x:46,y:50},
    scaleX:74,
    scaleY:74
},
{
    file:"img4.png",
    origin:{x:34,y:43},
    scaleX:55,
    scaleY:55
}
];

const picker = document.getElementById("picker");
const map = document.getElementById("map");
const marker = document.getElementById("marker");
const result = document.getElementById("result");
const copied = document.getElementById("copied");

let lastCoords = null;

function loadImage(){
    map.src = images[picker.value].file;
    marker.style.display = "none";
    result.innerText = "!shoot ? ?";

    // hide copied text on map switch
    copied.innerText = "";
}

function getCoords(e){
    const cfg = images[picker.value];
    const rect = map.getBoundingClientRect();

    const imgX = (e.clientX - rect.left) / rect.width * map.naturalWidth;
    const imgY = (e.clientY - rect.top) / rect.height * map.naturalHeight;

    const x = (imgX - cfg.origin.x) / cfg.scaleX;
    const y = (imgY - cfg.origin.y) / cfg.scaleY;

    return {
        x: x.toFixed(1),
        y: y.toFixed(1),
        px: e.clientX - rect.left,
        py: e.clientY - rect.top
    };
}

/* LIVE UPDATE */
map.addEventListener("mousemove", function(e){

    const c = getCoords(e);

    lastCoords = c;
    result.innerText = `!shoot ${c.x} ${c.y}`;
});

/* CLICK COPY + SHOW STATUS */
map.addEventListener("click", function(e){

    const c = getCoords(e);

    const text = `!shoot ${c.x} ${c.y}`;

    result.innerText = text;
    navigator.clipboard.writeText(text);

    // update marker
    marker.style.left = c.px + "px";
    marker.style.top = c.py + "px";
    marker.style.display = "block";

    // show copied message
    copied.innerText = `Copied: ${text}`;
});

picker.addEventListener("change", loadImage);

loadImage();

</script>

</body>
</html>
